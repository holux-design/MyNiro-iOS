name: MyNiro
options:
  bundleIdPrefix: com.holux-design
  deploymentTarget:
    iOS: "18.0"
    watchOS: "11.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top
  developmentLanguage: en
  knownRegions:
    - en
    - de
    - Base
settings:
  base:
    DEVELOPMENT_TEAM: Q7TA9WQ293
    SWIFT_VERSION: "5.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
packages:
  BetterBlueKit:
    path: Packages/BetterBlueKit
targets:
  MyNiro:
    type: application
    platform: iOS
    sources:
      - path: MyNiro
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.holux-design.MyNiro
        INFOPLIST_KEY_CFBundleDisplayName: "My Niro"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        CODE_SIGN_ENTITLEMENTS: MyNiro/MyNiro.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - package: BetterBlueKit
      - target: MyNiroWidget
      - target: MyNiroWatch
        embed: true
    entitlements:
      path: MyNiro/MyNiro.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.holux-design.MyNiro

  MyNiroWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: MyNiroWidget
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.holux-design.MyNiro.Widget
        INFOPLIST_KEY_CFBundleDisplayName: "My Niro"
        CODE_SIGN_ENTITLEMENTS: MyNiroWidget/MyNiroWidget.entitlements
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
    dependencies:
      - package: BetterBlueKit
    entitlements:
      path: MyNiroWidget/MyNiroWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.holux-design.MyNiro
    info:
      path: MyNiroWidget/Info.plist
      properties:
        CFBundleDisplayName: "My Niro"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  MyNiroWatch:
    type: application
    platform: watchOS
    sources:
      - path: MyNiroWatch
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.holux-design.MyNiro.Watch
        INFOPLIST_KEY_CFBundleDisplayName: "My Niro"
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.holux-design.MyNiro
        INFOPLIST_KEY_WKRunsIndependentlyOfCompanionApp: YES
        CODE_SIGN_ENTITLEMENTS: MyNiroWatch/MyNiroWatch.entitlements
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: MyNiroWatch/Info.plist
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SKIP_INSTALL: YES
        TARGETED_DEVICE_FAMILY: "4"
        SDKROOT: watchos
    dependencies:
      - package: BetterBlueKit
      - target: MyNiroWatchWidget
    entitlements:
      path: MyNiroWatch/MyNiroWatch.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.holux-design.MyNiro
    info:
      path: MyNiroWatch/Info.plist
      properties:
        CFBundleURLTypes:
          - CFBundleURLName: com.holux-design.MyNiro.Watch
            CFBundleURLSchemes:
              - myniro

  MyNiroWatchWidget:
    type: app-extension
    platform: watchOS
    sources:
      - path: MyNiroWatchWidget
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.holux-design.MyNiro.Watch.Widget
        INFOPLIST_KEY_CFBundleDisplayName: "My Niro"
        CODE_SIGN_ENTITLEMENTS: MyNiroWatchWidget/MyNiroWatchWidget.entitlements
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
        SKIP_INSTALL: YES
    dependencies:
      - package: BetterBlueKit
    entitlements:
      path: MyNiroWatchWidget/MyNiroWatchWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.holux-design.MyNiro
    info:
      path: MyNiroWatchWidget/Info.plist
      properties:
        CFBundleDisplayName: "My Niro"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

schemes:
  MyNiro:
    build:
      targets:
        MyNiro: all
        MyNiroWidget: all
        MyNiroWatch: all
        MyNiroWatchWidget: all
    run:
      config: Debug
      executable: MyNiro
  MyNiroWatch:
    build:
      targets:
        MyNiroWatch: all
        MyNiroWatchWidget: all
    run:
      config: Debug
      executable: MyNiroWatch
